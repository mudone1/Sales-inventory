<!DOCTYPE html>
<html lang="en">
<head>

    p { margin: 0 0 28px; color: #596a8b; line-height: 1.8; }
    a { display: inline-flex; align-items: center; justify-content: center; text-decoration: none; background: #1549a4; color: white; padding: 14px 22px; border-radius: 999px; font-weight: 700; transition: transform 0.18s ease; }
    a:hover { transform: translateY(-1px); }
  </style>
</head>

  <div class="panel">
    <img src="abbeylect logo.jpeg" alt="Abbeylect Electrical store logo">
